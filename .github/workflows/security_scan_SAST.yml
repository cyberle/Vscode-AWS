name: "Security Scanning"

on:
  push:
    branches: [ "master", "feature*" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 4 * * 1' # Runs every Monday at 04:30

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ] # Add 'javascript', 'java', etc. if your project grows

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # "security-extended" includes more aggressive security queries
        queries: security-extended,security-and-quality

    # Autobuild attempts to build any compiled languages. 
    # Since you are using Python, this step is very fast.
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
